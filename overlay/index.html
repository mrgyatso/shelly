<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>Companion Overlay</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="empty" class="empty">Waiting for an artifact…</div>
    <iframe id="frame" sandbox="allow-scripts" referrerpolicy="no-referrer" hidden></iframe>
    <div class="dragbar" data-tauri-drag-region></div>
    <div class="controls" id="controls">
      <button id="refresh" title="Reload">⟳</button>
      <button id="external" title="Open in browser">↗</button>
      <button id="hide" title="Close">✕</button>
    </div>
    <!-- Shown briefly after an interactive review artifact submits its
         compiled prose (kind:"submit"). The artifact's clipboard write
         lands in submit.ts, which then toggles `.visible` on this div. -->
    <div id="copied-toast" class="copied-toast">
      <span class="check">✓</span> Copied &mdash; <kbd>⌘V</kbd> in terminal
    </div>

    <!-- History HUD (⌘8). Hidden by default; history.ts reveals it only on the
         hist_main window and fills #history-grid with artifact preview cards. -->
    <div id="history" class="history" hidden>
      <header class="history-bar" data-tauri-drag-region>
        <h1>History</h1>
        <button id="history-close" title="Close">✕</button>
      </header>
      <div id="history-status" class="history-status" hidden></div>
      <div class="history-stage">
        <button id="hist-prev" class="hist-arrow hist-prev" title="Previous">‹</button>
        <div id="history-carousel" class="history-carousel"></div>
        <button id="hist-next" class="hist-arrow hist-next" title="Next">›</button>
      </div>
    </div>
  </body>
</html>
