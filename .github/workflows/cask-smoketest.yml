name: Cask smoke test

# Validate the Homebrew cask install path end-to-end on Apple Silicon
# (this project's primary dev box is Intel; arm64 runtime has not been
# physically confirmed). Runs on every push to master and on demand.
#
# Coverage: install via cask → app placed → CLI on PATH → companion doctor
# passes its layered checks. The actual overlay rendering (window popping
# on screen) still needs a human's eyes — a headless runner can't verify
# graphics.

on:
  push:
    branches: [master]
    paths:
      - 'overlay/**'
      - '.github/workflows/cask-smoketest.yml'
  workflow_dispatch:

jobs:
  cask-install:
    name: brew install + companion doctor (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macos-13 was the Intel leg until GitHub retired the image — a job asking
        # for it now queues forever (11h observed) and never schedules. Both current
        # images are Apple Silicon; Intel coverage is gone until a self-hosted
        # runner or a human on an Intel Mac provides it.
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - name: Show runner arch
        run: |
          uname -m
          sw_vers

      - name: Install the cask
        run: |
          # Homebrew 6 refuses a non-official tap's cask until it is trusted once.
          if brew trust --help >/dev/null 2>&1; then
            brew trust mrgyatso/tap
          fi
          brew install --cask mrgyatso/tap/claude-code-companion

      - name: Confirm app placed
        run: |
          test -d "/Applications/Companion Overlay.app" \
            || (echo "::error::app missing in /Applications" && exit 1)
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" \
            "/Applications/Companion Overlay.app/Contents/Info.plist"

      - name: Confirm CLI symlinks
        run: |
          which companion
          ls -l "$(which companion)"

      - name: Quarantine cleared by cask postflight
        run: |
          # postflight runs `xattr -dr com.apple.quarantine`; verify the flag is gone.
          if xattr -p com.apple.quarantine "/Applications/Companion Overlay.app" 2>/dev/null; then
            echo "::error::quarantine flag still set — cask postflight did not run"
            exit 1
          fi
          echo "ok — no quarantine flag"

      - name: Run companion doctor
        run: |
          # The artifacts dir is normally created by `companion setup`, which needs
          # Claude Code and never runs here; pre-create it so doctor's dir row
          # exercises the path-detection logic rather than always warning.
          mkdir -p "$HOME/.claude/companion/artifacts"
          companion doctor > doctor.out 2>&1 || echo "doctor exit: $?"
          cat doctor.out
          # Doctor ends by rendering its health panel through `companion open`, which
          # detaches the daemon (#84) rather than becoming it — so doctor returns, but
          # it may leave a headless overlay behind. Reap it so the runner exits clean.
          pkill -f companion-overlay 2>/dev/null || true

      - name: Doctor reports app + cli + dir green
        run: |
          # Require at least the deterministic, headless-safe rows.
          grep -q "ok  app installed"  doctor.out || (echo "::error::doctor: app row missing"   && exit 1)
          grep -q "ok  cli on PATH"    doctor.out || (echo "::error::doctor: cli row missing"   && exit 1)
          grep -q "ok  artifacts dir"  doctor.out || (echo "::error::doctor: dir row missing"   && exit 1)
          # Note: 'overlay daemon' and 'PostToolUse hook' rows may NOT be green on a
          # fresh CI runner (the daemon hasn't been launched and ~/.claude/settings.json
          # has no user hook). That's expected; this job validates the install layer
          # only — the render path needs a human (see plugin-e2e-checklist.html).
