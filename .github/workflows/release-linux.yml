name: Release (Linux bundles)

# Builds the Ubuntu/Debian bundles — amd64 and arm64 — and attaches them to the
# release. The macOS half lives in release-macos.yml; both fire on the same tag.
#
# `install.sh`'s Ubuntu branch downloads the `_<arch>.deb` asset from the latest
# release, so until this job has run once, that branch has nothing to fetch —
# and until the arm64 leg has run once, `install.sh` on an arm64 box dies with
# "no arm64 .deb in the latest release".
#
# Fires on a version tag, or on demand against an existing tag/release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build and attach Linux bundles to (e.g. v0.5.0)'
        required: true

jobs:
  linux-bundles:
    name: tauri build → .deb + AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # The build runs INSIDE jammy, not on the runner. glibc is backwards- but not
    # forwards-compatible: a binary linked against the runner's glibc 2.39 will not
    # start on anything older, and `.deb`s carry no glibc floor of their own — so
    # v0.7.0 installed cleanly on Ubuntu 22.04 and then died with
    # "version `GLIBC_2.39' not found", while the README promised 22.04+.
    # Building against the OLDEST glibc we support makes one bundle that runs on
    # 22.04 through current. Raise this image only when we drop a release.
    container: ubuntu:22.04
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      # One architecture failing must not cancel the other's upload.
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: System deps (WebKitGTK + bundler + toolchain)
        # The container is a bare image: no curl, no git, no compiler, and no sudo
        # (we are already root). actions/checkout needs git, and rustup needs curl,
        # so this has to come BEFORE the checkout.
        #
        # xdg-utils is not optional: the AppImage bundler shells out to `xdg-mime`
        # and dies with "xdg-mime binary not found" without it. The .deb builds
        # fine either way, so a missing xdg-utils fails only the AppImage — late,
        # and after the deb has already been produced.
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -qq
          apt-get install -y -qq curl git ca-certificates build-essential pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev \
            patchelf file xdg-utils jq

          # `gh` is preinstalled on the RUNNER, not in this container — and the
          # final step uploads with it. Without this the whole job compiles for
          # half an hour and then dies on `gh: not found`.
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            -o /usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            > /etc/apt/sources.list.d/github-cli.list
          apt-get update -qq
          apt-get install -y -qq gh
          gh --version | head -1

      - uses: actions/checkout@v4
        with:
          # workflow_dispatch runs against a tag the maintainer names; a tag push
          # already has the right ref checked out.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Rust
        # rustup rather than an action: the toolchain must be installed inside the
        # container, against its glibc — not inherited from the host runner.
        run: |
          curl -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: The tag and the app version must agree
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        # Tauri bakes tauri.conf.json's version into the binary, and the updater
        # compares THAT against the version advertised for the release. Let them
        # drift and the updater either never fires, or reinstalls the same build
        # forever. v0.5.0 shipped a binary calling itself 0.1.11 exactly this way.
        #
        # tauri.conf.json stays the source of truth rather than being stamped from
        # the tag here: macOS bundles are built off this repo too, and stamping in
        # this workflow would keep Linux honest while letting macOS drift on.
        run: |
          conf=$(jq -r .version overlay/src-tauri/tauri.conf.json)
          want=${TAG#v}
          if [ "$conf" != "$want" ]; then
            echo "::error::tag $TAG wants version $want, but tauri.conf.json says $conf — bump it before tagging"
            exit 1
          fi
          echo "version $conf matches tag $TAG"

      - name: The release must exist before we spend 30 minutes building for it
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        # Nothing in this repo creates the release — both release workflows only
        # UPLOAD to one. A tag with no release therefore built for half an hour and
        # then died on "release not found", which is exactly what v0.7.1 did.
        #
        # Create it as a PRERELEASE when it is missing: GitHub's /releases/latest
        # excludes prereleases, and install.sh resolves the .deb from /releases/latest
        # — so the new tag stays invisible to installers until the assets are actually
        # attached and a human promotes it. Publishing a bare release here instead
        # would point every installer at a version with no .deb to download.
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $TAG already exists"
          else
            echo "release $TAG does not exist — creating it as a prerelease"
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" --generate-notes --prerelease
          fi

      - name: Build the frontend + bundles
        working-directory: overlay
        # `bundle.targets` is "all", which on Linux means .deb + .rpm + AppImage.
        # We ship the deb and the AppImage; the rpm is built but not attached
        # (nothing claims to support Fedora yet — don't imply support we haven't tested).
        run: |
          npm ci
          npm run tauri build

      - name: The binary must not demand a glibc newer than we claim to support
        # The failure this guards against is silent and late: a too-new glibc still
        # produces a .deb that installs perfectly, and only refuses to start on the
        # user's machine. Assert the floor here, where it is loud and free — if this
        # trips, the container image moved and the README's claim moved with it.
        env:
          FLOOR: '2.35' # Ubuntu 22.04 / Debian 12
        run: |
          bin=overlay/src-tauri/target/release/shelly
          want=$(objdump -T "$bin" | grep -o 'GLIBC_[0-9.]*' | sed 's/GLIBC_//' | sort -V | tail -1)
          echo "binary needs at most glibc $want; the floor is $FLOOR"
          if [ "$(printf '%s\n%s\n' "$want" "$FLOOR" | sort -V | tail -1)" != "$FLOOR" ]; then
            echo "::error::binary needs glibc $want but we promise $FLOOR — it will install and then fail to launch"
            exit 1
          fi

      - name: Collect the artifacts
        id: collect
        run: |
          mkdir -p out
          find overlay/src-tauri/target/release/bundle -type f \
            \( -name '*.deb' -o -name '*.AppImage' \) -exec cp {} out/ \;
          ls -lh out/
          test -n "$(ls -A out/)" || (echo "::error::no Linux bundles produced" && exit 1)

      - name: Attach to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        # --clobber so a re-run replaces the assets instead of erroring on a name
        # collision (this workflow is re-runnable against an existing release).
        run: gh release upload "$TAG" out/* --clobber --repo "$GITHUB_REPOSITORY"
