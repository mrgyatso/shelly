name: Homebrew cask

# The macOS half of a release used to end at "the DMG is attached", and a human
# was expected to remember the tap. v0.7.1 is what that costs: the release went
# out, `brew upgrade` stayed a no-op, and every Mac user silently sat on the
# previous version. Homebrew IS the macOS install path — a release the tap has
# not heard about is not released.
#
# This fires on `released`, NOT on the tag push, and the distinction is the whole
# point: release-macos.yml creates a missing release as a PRERELEASE so installers
# cannot see it, and `released` is the one event that fires both when a release is
# published outright and when a prerelease is promoted. Bumping the cask any
# earlier would hand Mac users a build we had deliberately hidden from them.
on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to point the cask at (e.g. v0.7.1)'
        required: true

jobs:
  bump:
    name: Point the cask at the new release
    runs-on: ubuntu-latest
    steps:
      - name: Bump the cask to this release
        env:
          # A PAT with contents:write on mrgyatso/homebrew-tap. The job's own
          # GITHUB_TOKEN is scoped to THIS repo and cannot push to the tap.
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::error::TAP_TOKEN is not set, so the cask cannot be bumped — Homebrew still points at the previous release and every 'brew upgrade' is a no-op. Add a PAT with contents:write on mrgyatso/homebrew-tap as the TAP_TOKEN secret, then re-run this job. It does not rebuild anything."
            exit 1
          fi

          version="${TAG#v}"
          dmg="Shelly_${version}_universal.dmg"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${dmg}"

          # Hash what users will actually download, not what a build box produced.
          curl -fsSL --retry 3 -o "$dmg" "$url"
          sha="$(sha256sum "$dmg" | cut -d' ' -f1)"
          echo "$dmg -> $sha"

          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/mrgyatso/homebrew-tap.git" tap
          cd tap
          cask=Casks/shelly.rb

          # The cask derives the DMG's name from `version`, so version + sha256 is
          # the entire bump.
          sed -i -E "s|^  version \"[^\"]+\"|  version \"${version}\"|" "$cask"
          sed -i -E "s|^  sha256 \"[^\"]+\"|  sha256 \"${sha}\"|" "$cask"

          # A sed that matched nothing exits 0. Prove both edits actually landed,
          # or this "succeeds" while leaving the tap exactly as stale as before.
          grep -q "version \"${version}\"" "$cask" || { echo "::error::the version did not take — has the cask's shape changed?"; exit 1; }
          grep -q "sha256 \"${sha}\"" "$cask"     || { echo "::error::the sha256 did not take — has the cask's shape changed?"; exit 1; }

          if git diff --quiet; then
            echo "the cask is already at ${version} — nothing to do"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -qam "shelly ${version}"
          git push
          echo "tap bumped to ${version}"

      # Everything above proves the edit landed in the LOCAL clone. That is not the
      # question. The question is whether Homebrew — which reads the tap over the
      # network, not our working copy — now serves this version. Ask GitHub, not
      # ourselves.
      #
      # This exists because v0.8.0 shipped with the tap silently one version behind
      # and nobody noticed: the job can exit 0 having pushed nothing (the early
      # "already at ${version}" path is reachable when the tap was bumped out-of-band),
      # and a push that fails on a revoked token is the same shape as a job that had
      # nothing to do. Both look green. So assert the OUTCOME, not the steps.
      - name: The tap must actually serve this version
        env:
          TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}
        run: |
          version="${TAG#v}"
          live=$(curl -fsSL "https://raw.githubusercontent.com/mrgyatso/homebrew-tap/main/Casks/shelly.rb" \
                 | sed -nE 's|^  version "([^"]+)".*|\1|p')
          echo "tap serves: ${live:-<none>} — expected: ${version}"
          if [ "$live" != "$version" ]; then
            echo "::error::the tap serves ${live:-nothing}, not ${version}. Homebrew users are stranded on the old build and 'brew upgrade' is a no-op. The bump did not reach GitHub — check TAP_TOKEN has contents:write on mrgyatso/homebrew-tap."
            exit 1
          fi
          echo "ok — brew upgrade will get ${version}"
