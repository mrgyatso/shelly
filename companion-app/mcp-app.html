<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Status Board</title>
<style>
  :root {
    --navy: #0a1f44; --navy-2: #14305c; --ink: #1a2233; --paper: #f7f5f1;
    --card: #ffffff; --coral: #ff6a5a; --coral-deep: #e0493a; --line: #e3ddd3;
    --muted: #6b7385; --green: #1f9d6b; --blue: #2f6df0;
    --shadow: 0 1px 2px rgba(10,31,68,.06), 0 8px 24px rgba(10,31,68,.07);
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink); line-height: 1.55;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 0 22px 64px; }
  header.hero {
    background:
      radial-gradient(1000px 360px at 90% -10%, rgba(255,106,90,.18), transparent 60%),
      linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
    color: #fff; padding: 44px 0 52px; margin-bottom: -28px;
  }
  .hero .wrap { padding-bottom: 0; }
  .eyebrow { text-transform: uppercase; letter-spacing: .22em; font-size: 11px; font-weight: 700; color: var(--coral); margin: 0 0 12px; }
  h1 { font-size: clamp(1.7rem, 1rem + 3.5vw, 2.6rem); line-height: 1.05; margin: 0 0 14px; font-weight: 800; letter-spacing: -.02em; }
  .hero p.lede { font-size: 1rem; max-width: 66ch; color: #cdd6e6; margin: 0; }
  .hero .meta { margin-top: 22px; display: flex; gap: 9px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); color: #eaf0fb; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .chip b { color: #fff; }
  section { margin-top: 44px; }
  .sec-head { display: flex; align-items: baseline; gap: 13px; margin-bottom: 18px; }
  .sec-num { font-weight: 800; font-size: 13px; color: var(--coral-deep); background: #fff; border: 1px solid var(--line); width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; flex: none; box-shadow: var(--shadow); }
  h2 { font-size: 1.4rem; margin: 0; font-weight: 800; letter-spacing: -.01em; }
  .sec-sub { color: var(--muted); font-size: .92rem; margin: 2px 0 0; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }

  /* progress */
  .progress { display: flex; align-items: center; gap: 12px; margin: 0 0 18px; }
  .bar { flex: 1; height: 9px; background: #ece8e0; border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--coral), var(--coral-deep)); transition: width .3s ease; }
  .progress .pct { font-variant-numeric: tabular-nums; font-weight: 800; color: var(--navy); font-size: .95rem; }

  /* timeline + tasks */
  .timeline { position: relative; margin-left: 8px; padding-left: 28px; }
  .timeline::before { content: ""; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 2px; background: var(--line); }
  .tstep { position: relative; margin-bottom: 22px; }
  .tstep:last-child { margin-bottom: 0; }
  .tstep::before { content: ""; position: absolute; left: -28px; top: 3px; width: 15px; height: 15px; border-radius: 50%; background: #fff; border: 3px solid var(--coral); }
  .tstep.now::before { background: var(--coral); box-shadow: 0 0 0 4px rgba(255,106,90,.18); }
  .twin { font-size: .75rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
  .tlabel { font-weight: 800; color: var(--navy); font-size: 1rem; margin: 2px 0 8px; }
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border: 1px solid transparent; border-radius: 10px; transition: background .15s, border-color .15s; }
  .task:hover { background: #faf8f4; border-color: var(--line); }
  .task input[type=checkbox] { appearance: none; -webkit-appearance: none; width: 19px; height: 19px; margin: 1px 0 0; border: 2px solid #c7cdd8; border-radius: 6px; cursor: pointer; flex: none; position: relative; transition: background .15s, border-color .15s; }
  .task input[type=checkbox]:checked { background: var(--green); border-color: var(--green); }
  .task input[type=checkbox]:checked::after { content: "✓"; position: absolute; inset: 0; color: #fff; font-size: 13px; font-weight: 800; display: grid; place-items: center; }
  .task .txt { flex: 1; font-size: .95rem; }
  .task.done .txt { color: var(--muted); text-decoration: line-through; }
  .task .ask { opacity: 0; border: 1px solid var(--line); background: #fff; color: var(--blue); font-weight: 700; font-size: .76rem; padding: 3px 9px; border-radius: 999px; cursor: pointer; flex: none; transition: opacity .15s, background .15s; }
  .task:hover .ask, .task:focus-within .ask { opacity: 1; }
  .task .ask:hover { background: #eef3ff; }

  .callout { padding: 20px; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%); color: #eaf0fb; border-radius: var(--radius); box-shadow: var(--shadow); }
  .callout h3 { margin: 0 0 10px; color: #fff; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
  .callout .tag { font-size: 10px; background: var(--coral); color: #fff; padding: 3px 8px; border-radius: 999px; letter-spacing: .1em; font-weight: 800; }
  .callout p { margin: 7px 0; font-size: .92rem; }

  .toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px); background: var(--navy); color: #fff; padding: 11px 18px; border-radius: 10px; font-size: .9rem; font-weight: 600; box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 20; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--line); color: var(--muted); font-size: .82rem; }
</style>
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <p class="eyebrow">Claude Code Companion · Status Board</p>
      <h1 id="h-title">Loading…</h1>
      <p class="lede" id="h-sub"></p>
      <div class="meta" id="h-meta"></div>
    </div>
  </header>

  <div class="wrap">
    <section>
      <div class="sec-head">
        <span class="sec-num">✓</span>
        <div><h2>Next steps</h2><p class="sec-sub">Check items as you finish. Hover a task to ask Claude about it.</p></div>
      </div>
      <div class="card" style="padding: 22px 22px 22px 18px;">
        <div class="progress"><div class="bar"><i id="bar-fill"></i></div><span class="pct" id="bar-pct">0%</span></div>
        <div class="timeline" id="tasks-root"></div>
      </div>
    </section>

    <section id="callout-section" hidden>
      <div class="sec-head">
        <span class="sec-num">★</span>
        <div><h2>Marketing must-do</h2><p class="sec-sub">Carried over from the wiki.</p></div>
      </div>
      <div class="callout" id="callout-root"></div>
    </section>

    <footer id="foot">Connecting to session…</footer>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="/src/mcp-app.ts"></script>
</body>
</html>
